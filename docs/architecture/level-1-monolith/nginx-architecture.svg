<svg viewBox="0 0 660 400" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, monospace" font-size="12">
  <defs>
    <marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#8b949e"/>
    </marker>
    <marker id="ab" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#58a6ff"/>
    </marker>
    <marker id="ap" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#bc8cff"/>
    </marker>
  </defs>

  <rect width="660" height="400" fill="#0d1117"/>

  <!-- Browser -->
  <rect x="20" y="60" width="110" height="44" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="75" y="87" fill="#e6edf3" text-anchor="middle">Browser</text>

  <!-- Arrow browser → nginx -->
  <line x1="130" y1="82" x2="198" y2="82" stroke="#8b949e" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="164" y="76" fill="#8b949e" text-anchor="middle" font-size="10">HTTP</text>

  <!-- nginx -->
  <rect x="200" y="60" width="140" height="44" rx="6" fill="#161b22" stroke="#238636" stroke-width="1.5"/>
  <text x="270" y="79" fill="#e6edf3" text-anchor="middle">nginx :80</text>
  <text x="270" y="96" fill="#3fb950" text-anchor="middle" font-size="10">listen 80</text>

  <!-- nginx → routing -->
  <line x1="270" y1="104" x2="270" y2="148" stroke="#30363d" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Routing block -->
  <rect x="200" y="150" width="140" height="70" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="270" y="169" fill="#8b949e" text-anchor="middle" font-size="10">роутинг</text>
  <rect x="212" y="174" width="116" height="18" rx="3" fill="#0d419d" opacity="0.6"/>
  <text x="270" y="186" fill="#58a6ff" text-anchor="middle" font-size="11">location /</text>
  <rect x="212" y="194" width="116" height="18" rx="3" fill="#6e40c9" opacity="0.5"/>
  <text x="270" y="207" fill="#bc8cff" text-anchor="middle" font-size="11">location /api/</text>

  <!-- Static files -->
  <rect x="60" y="290" width="150" height="50" rx="6" fill="#161b22" stroke="#0d419d" stroke-width="1.5"/>
  <text x="135" y="312" fill="#e6edf3" text-anchor="middle">статика</text>
  <text x="135" y="330" fill="#58a6ff" text-anchor="middle" font-size="10">/usr/share/nginx/html</text>

  <!-- location / → static -->
  <line x1="235" y1="183" x2="185" y2="288" stroke="#58a6ff" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ab)"/>
  <text x="193" y="248" fill="#58a6ff" font-size="10">отдаёт сам</text>

  <!-- Backend -->
  <rect x="450" y="240" width="150" height="50" rx="6" fill="#161b22" stroke="#6e40c9" stroke-width="1.5"/>
  <text x="525" y="262" fill="#e6edf3" text-anchor="middle">backend :8000</text>
  <text x="525" y="280" fill="#bc8cff" text-anchor="middle" font-size="10">только внутри Docker</text>

  <!-- upstream label -->
  <rect x="450" y="155" width="180" height="52" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="460" y="172" fill="#8b949e" font-size="10">upstream backend {</text>
  <text x="460" y="188" fill="#8b949e" font-size="10">  server backend:8000;</text>
  <text x="460" y="202" fill="#8b949e" font-size="10">}</text>
  <line x1="525" y1="207" x2="525" y2="238" stroke="#30363d" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- location /api/ → backend -->
  <line x1="340" y1="207" x2="448" y2="257" stroke="#bc8cff" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ap)"/>
  <text x="415" y="240" fill="#bc8cff" font-size="10">proxy_pass</text>

  <!-- Postgres -->
  <rect x="450" y="340" width="150" height="44" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="525" y="366" fill="#8b949e" text-anchor="middle">postgres :5432</text>
  <line x1="525" y1="290" x2="525" y2="338" stroke="#30363d" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Headers note -->
  <rect x="450" y="40" width="195" height="82" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="460" y="57" fill="#8b949e" font-size="10">proxy_set_header:</text>
  <text x="460" y="73" fill="#e6edf3" font-size="10">Host            $host</text>
  <text x="460" y="89" fill="#e6edf3" font-size="10">X-Real-IP       $remote_addr</text>
  <text x="460" y="105" fill="#e6edf3" font-size="10">X-Forwarded-For $proxy_add_x_forwarded_for</text>
</svg>
