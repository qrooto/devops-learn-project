apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: bulletin-board
spec:
  replicas: 3
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          # ⚠️ :latest здесь — только для локального minikube (образ собирается на месте).
          # В реальном флоу тег должен быть ИММУТАБЕЛЬНЫМ — по коммиту, например
          # :$CI_COMMIT_SHA из CI (level-4-gitlab уже тегает образы так):
          # image: ghcr.io/<твой-username>/devops-project/bulletin-board-backend:a1b2c3d
          # Почему: под одним и тем же тегом latest контент меняется — Kubernetes
          # не увидит «изменения» в манифесте и не перекатит Pod-ы, ArgoCD не увидит
          # diff с Git, а откат на «предыдущий latest» невозможен в принципе.
          # Подробнее: level-8 README, раздел «Как GitOps узнаёт о новом образе».
          image: bulletin-board-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: postgres-secret
            - configMapRef:
                name: backend-config
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "500m"
