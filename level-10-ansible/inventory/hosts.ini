# Инвентарь — список управляемых хостов.
# Ansible применяет плейбуки к хостам из этого файла.

[local]
# Локальная машина (управляет собой).
# connection=local означает что SSH не нужен.
localhost ansible_connection=local

[webservers]
# Удалённые VM. Раскомментируй и заполни своими IP.
# devops-vm-1 ansible_host=192.168.1.100 ansible_user=ubuntu
# devops-vm-2 ansible_host=192.168.1.101 ansible_user=ubuntu

[all:vars]
# Переменные применяются ко всем хостам.
ansible_python_interpreter=/usr/bin/python3
