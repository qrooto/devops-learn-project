---
# Установка Docker по официальной инструкции (не из apt Ubuntu — там старая версия).

- name: Remove old Docker packages
  apt:
    name:
      - docker
      - docker-engine
      - docker.io
      - containerd
      - runc
    state: absent

- name: Add Docker GPG key
  apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present

- name: Add Docker repository
  apt_repository:
    repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present

- name: Install Docker Engine
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    update_cache: true
    state: present
  notify: Restart Docker   # вызовет handler если пакет изменился

- name: Add current user to docker group
  user:
    name: "{{ ansible_user }}"
    groups: docker
    append: true

- name: Ensure Docker service is started and enabled
  service:
    name: docker
    state: started
    enabled: true
