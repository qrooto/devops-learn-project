# ПРИМЕР того как выглядит SealedSecret — этот файл НЕ рабочий:
# шифротекст здесь фейковый, а настоящий в любом случае привязан
# к публичному ключу конкретного кластера.
# Свой файл сгенерируй по README (Шаг 2): kubeseal < secret.yml > sealed/postgres-sealedsecret.yml
#
# Обрати внимание: такой файл МОЖНО коммитить в Git — в encryptedData
# не пароль, а результат асимметричного шифрования. Расшифровать может
# только контроллер в кластере, у которого есть приватный ключ.
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: postgres-secret
  namespace: bulletin-board
spec:
  encryptedData:
    POSTGRES_DB: AgB4kX...длинный-шифротекст...==       # ← плейсхолдер
    POSTGRES_USER: AgCmQ9...длинный-шифротекст...==     # ← плейсхолдер
    POSTGRES_PASSWORD: AgAr7L...длинный-шифротекст...== # ← плейсхолдер
    DATABASE_URL: AgDt2w...длинный-шифротекст...==      # ← плейсхолдер
  template:
    metadata:
      name: postgres-secret
      namespace: bulletin-board
    type: Opaque
