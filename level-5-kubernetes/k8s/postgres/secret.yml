apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: bulletin-board
type: Opaque
# У Secret два поля для значений:
#   data:       значения в base64 (kubectl хранит и отдаёт их так)
#   stringData: открытый текст — Kubernetes сам закодирует в base64 при применении
# Мы используем stringData, значит здесь ОТКРЫТЫЙ текст.
#
# ⚠️ base64 — это НЕ шифрование, а просто кодировка: раскодировать может любой
# (echo cG9zdGdyZXM= | base64 -d). Любой Secret в Git = утечка пароля.
# Здесь это осознанный учебный плейсхолдер (postgres/postgres в локальном minikube).
# Как хранить секреты в Git по-настоящему (SealedSecrets, SOPS) — level-8.5-secrets.
stringData:
  POSTGRES_DB: bulletin_board
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres
  DATABASE_URL: postgresql://postgres:postgres@postgres:5432/bulletin_board
