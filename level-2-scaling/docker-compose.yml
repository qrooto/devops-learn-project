services:
  postgres:
    image: postgres:16-alpine
    # 🔒 Security: реальные креды задаются в .env (см. .env.example, .env в .gitignore).
    # Значения после ":-" — учебные плейсхолдеры чтобы уровень запускался из коробки.
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bulletin_board}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Три отдельных инстанса бэкенда.
  # В реальности при использовании Kubernetes это делается через replicas: 3,
  # но в Docker Compose для явной демонстрации проблемы сессий — прописываем вручную.
  backend_1:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-bulletin_board}
    depends_on:
      postgres:
        condition: service_healthy

  backend_2:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-bulletin_board}
    depends_on:
      postgres:
        condition: service_healthy

  backend_3:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-bulletin_board}
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend_1
      - backend_2
      - backend_3

volumes:
  postgres_data:
